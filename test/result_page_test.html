<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha2/css/bootstrap.min.css" integrity="sha384-DhY6onE6f3zzKbjUPRc2hOzGAdEf4/Dz+WJwBvEYL/lkkIsI3ihufq9hk9K4lVoK" crossorigin="anonymous">
    <script src="./data.js"></script>
    <script>
      var before_ranking = document.getElementById("before_ranking");
      var ranking_container = document.createElement("div");
      ranking_container.setAttribute("class","row");
      var src_new = `<p class="col-md-6 has-cyan-bluish-gray-color has-text-color" id="ranking1">【投票ランキング10位】<br>1位　71.とめぞう<br>2位　13.和泉 茉那<br>3位　39.金子 裕<br>4位　73.玉守ヒロト<br>5位　43.原田友貴<br>6位　112.皿屋敷あみ<br>7位　27.かすみみたま<br>8位　52.飯塚こと<br>9位　30.ごまだんご<br>10位　09.小森</p><p class="col-md-6 has-cyan-bluish-gray-color has-text-color" id="ranking1">【投票ランキング10位】<br>1位　71.とめぞう<br>2位　13.和泉 茉那<br>3位　39.金子 裕<br>4位　73.玉守ヒロト<br>5位　43.原田友貴<br>6位　112.皿屋敷あみ<br>7位　27.かすみみたま<br>8位　52.飯塚こと<br>9位　30.ごまだんご<br>10位　09.小森</p>`;
      ranking_container.innerHTML = src_new;
      var parent_container = document.body.firstChild;
      parent_container.insertBefore(ranking_container,before_ranking);

      //自动根据data创建20个展示卡片
      var list_container = document.createElement("div");
      list_container.setAttribute("id","list_container");
      var row_container = document.createElement("div");
      row_container.setAttribute("class","row");
      list_container.appendChild(row_container);
      var src = ``;
      for(let i=1;i<=names.size;i++){
        src = src + `<div class="card mb-3 text-center text-white bg-dark col-md-3">
      <div class="row g-0">
        <div class="w-25">
          <img src=${pics.get(i)}  alt=${names.get(i)} class="img-thumbnail">
        </div>
        <div class="w-75 col-md-8 align-self-stretch">
            <div class="card-body">
                <h5 class="card-title">${names.get(i)}</h5>
                <p class="card-text" style="font-size: small;">${free_titles.get(i)}</p>
                <button type="button" class="btn btn-secondary" id="${i}">キャスターのページへ</button>
            </div>
        </div>
      </div>
    </div>`;
      }
      console.log(names.size);
      row_container.innerHTML=src;
      window.onload = function(){
        document.body.appendChild(list_container);
        row_container.onclick = function(ev){
          var e = ev||window.event;
          if(e.target.tagName=="BUTTON"){
            var link = channel_links.get(parseInt(e.target.id));
            window.open(link,"_blank");
          }
        }
      }      
    </script>
</head>
<body>
  
</body>
</html>
