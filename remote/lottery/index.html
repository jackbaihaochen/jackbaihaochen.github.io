    <script type="text/javascript">
      var phoneWidth = parseInt(window.screen.width);
      var phoneScale = phoneWidth / 640;
      var ua = navigator.userAgent;
      if (/Android (\d+\.\d+)/.test(ua)) {
        var version = parseFloat(RegExp.$1);
        // andriod 2.3
        if (version > 2.3) {
          document.write(
            '<meta name="viewport" content="width=640, minimum-scale = ' +
              phoneScale +
              ", maximum-scale = " +
              phoneScale +
              ', target-densitydpi=device-dpi">'
          );
          // andriod 2.3以上
        } else {
          document.write(
            '<meta name="viewport" content="width=640, target-densitydpi=device-dpi">'
          );
        }
        // 其他系统
      } else {
        document.write(
          '<meta name="viewport" content="width=640, user-scalable=no, target-densitydpi=device-dpi">'
        );
      }
    </script>

    <script>
      $(document).ready(function (e) {
        //积分不足 关闭
        $("#no_jifeng em img").click(function () {
          $("#no_jifeng").hide();
        });

        //复制文本函数,传入参数为想要复制到粘贴板的文本
        function copy_text(text) {
          const input = document.createElement("input");
          input.setAttribute("style", "display='none'");
          input.setAttribute("readonly", "readonly");
          document.body.appendChild(input);
          input.setAttribute("value", `${text}`);
          input.focus();
          input.setSelectionRange(0, 9999);
          if (document.execCommand("copy")) {
            document.execCommand("copy");
            console.log("复制成功");
            console.log(input.value);
          }
          document.body.removeChild(input);
        }

        //限制每日访问次数函数,如何没到限制可以访问返回true，如无法访问返回false；
        function daily_login_restriction() {
          //检测之前是否有下次可以访问时间的记录，如果无或已到期，则更新下次可访问时间并正常显示；
          // if((!localStorage.getItem("next_time"))||(Date.now()>parseInt(localStorage.getItem("next_time")))){
          // 	var next_time = Date.now() + (1000*60*60*24);
          // 	localStorage.setItem("next_time",next_time.toString());
          return true;
          // }else{
          // 	//如果有下次访问时间并且尚未到期，则无法访问；
          // 	alert("もう抽選しました！");
          // 	return false;
          // }
        }

        //展示结果的zoom-in动画
        function result_animation() {
          var $niu_danji = $(".niu_danji");
          $niu_danji.css({
            "animation-name": "result_animation_niu_danji",
            "animation-duration": "3s",
            "animation-delay": "1s",
            "animation-fill-mode": "forwards",
            "animation-timing-function": "linear",
          });
          setTimeout(function () {
            $niu_danji.animate(
              { top: -document.body.clientHeight / 2 },
              3000,
              "linear"
            );
          }, 1000);
          var $result_covering = $(".result_covering");
          $result_covering.css({
            "animation-name": "result_animation_result_covering",
            "animation-duration": "2s",
            "animation-delay": "4s",
            "animation-fill-mode": "both",
            display: "block",
          });
        }

        //设定score为100，从而只能抽一次奖；
        var score = 100;

        $(".game_go").click(function () {
          if (daily_login_restriction()) {
            score -= 100;
            if (score < 0) {
              for (i = 1; i <= 11; i++) {
                $(".qiu_" + i).removeClass("wieyi_" + i);
              }
              $("#no_jifeng").show();
            } else {
              draw();
              $(".game_go").prop("onclick", null).off("click");
            }
          }
        });

        function draw() {
          //创建1~100随机数，以达成概率效果;
          var random_num = Math.floor(100 * Math.random() + 1);
          //1是一年，2是半年，3是没中;
          var number = 0;
          if (random_num >= 1 && random_num <= 30) {
            number = 1;
          } else if (random_num >= 31 && random_num <= 80) {
            number = 2;
          } else {
            number = 3;
          }

          var coupon_link = null;
          var coupon_code = null;
          var browser = navigator.userAgent;
          var result_page = "test-result-page.html";
          //发送抽奖结果，并返回coupon
          $.ajax({
            type: "GET",
            url: "get_method_data_exchange.php",
            dataType: "json",
            data: {
              number: number,
              browser: browser,
            },
            success: function (data) {
              if (data.code) {
                if (data.code == 2) {
                  result_animation();
                  setTimeout(function () {
                    //拼成get请求访问结果页
                    window.open(
                      `${result_page}?number=${number}&coupon_link=null&coupon_code=null`,
                      "_self"
                    );
                  }, 6000);
                } else {
                  alert("Error: " + data.message);
                }
              } else {
                coupon_link = data.coupon_link;
                coupon_code = data.coupon_code;
                console.log(coupon_link);
                console.log(coupon_code);
                result_animation();
                setTimeout(function () {
                  //拼成get请求访问结果页
                  window.open(
                    `${result_page}?number=${number}&coupon_link=${coupon_link}&coupon_code=${coupon_code}`,
                    "_self"
                  );
                }, 6000);
              }
            },
          });

          for (i = 1; i <= 11; i++) {
            $(".qiu_" + i).removeClass("diaol_" + i);
            $(".qiu_" + i).addClass("wieyi_" + i);
          }

          setTimeout(function () {
            for (i = 1; i <= 11; i++) {
              $(".qiu_" + i).removeClass("wieyi_" + i);
            }
          }, 5100);
          setTimeout(function () {
            switch (number) {
              case 1:
                $(".zjdl").children("span").addClass("diaL_one");
                break;
              case 2:
                $(".zjdl").children("span").addClass("diaL_two");
                break;
              // case 3:$(".zjdl").children("span").addClass("diaL_three");break;
              // case 4:$(".zjdl").children("span").addClass("diaL_four");break;
              case 3:
                $(".zjdl").children("span").addClass("diaL_four");
                break;
            }
            $(".zjdl").removeClass("none").addClass("dila_Y");
          }, 1100);

          //取消动画
          setTimeout(function () {
            $(".wdjifen").html(score);
          }, 2500);
        }
      });
