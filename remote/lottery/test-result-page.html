<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-result-page</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
</head>
<body>
    <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel" data-interval="false" touch="true">
        <ol class="carousel-indicators">
          <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
          <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
          <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
        </ol>
        <div class="carousel-inner vh-100" style="background-color:black;align-items: center;">
          <div class="carousel-item active">
            <div class="container">
                <div>
                    <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModal" data-whatever="@mdo">コードをメールに送りる</button>
                    
                    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                            <h5 class="modal-title" id="exampleModalLabel">himalayaの聴き放題クーポンコード</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                            </div>
                            <div class="modal-body">
                            <form>
                                <div class="form-group">
                                <label for="recipient-name" class="col-form-label">宛先：</label>
                                <input type="text" class="form-control" id="recipient-name" placeholder="メールアドレスを入力してください">
                                </div>
                                <div class="form-group">
                                <label for="message-text" class="col-form-label">内容：</label>
                                <textarea class="form-control" id="message-text"></textarea>
                                </div>
                            </form>
                            </div>
                            <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">閉じる</button>
                            <button type="button" class="btn btn-primary">送信</button>
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
        
                <button type="button" class="btn btn-danger" id="use_coupon_link">今すぐ使う</button>
            </div>
          </div>
          <div class="carousel-item">
            <img src="..." class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="..." class="d-block w-100" alt="...">
          </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
    </div>


	<script>
        //解析前面网站发送过来的get请求
        function analyze_url(url){
            var data = new Map();
            var arr = url.split("?")[1].split("&");
            for(var i=0; i<arr.length;i++){
                var key = arr[i].split("=")[0];
                var value = arr[i].split("=")[1];
                data.set(key,value);
            }
            return data;
        }

		window.onload = function(){
			var prev_url = window.location.href;
            var data = analyze_url(prev_url);
            $("#message-text").text(`クーポンコードは：${data.get("coupon_code")}`);
            $("#use_coupon_link").click(function(){
                alert(data.get("coupon_link"));
                window.open("https://www.google.com","_self");
            })
		}
	</script>
</body>
</html>
