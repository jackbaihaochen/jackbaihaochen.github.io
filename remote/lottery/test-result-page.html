<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-result-page</title>
    <script src="./js/jquery-3.5.1.min.js"></script>
    <script src="./js/fullpage.js"></script>
    <link rel="stylesheet" type="text/css" href="./css/fullpage.css">
    <link rel="stylesheet" type="text/css" href="./css/bootstrap.min.css">
</head>
<body>
  <div id="fullpage">
    <div class="section vh-100" style="background-color: black;">
      <div class="container">
        <div>
          <button type="button" class="btn btn-primary" id="open_btn">クーポンコードを送る</button>

          <div class="modal fade show" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" style="display: none;" aria-modal="true" role="dialog">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="exampleModalLabel">himalaya聴き放題のクーポンコード</h5>
                  <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <form>
                    <div class="form-group">
                      <label for="recipient-name" class="col-form-label">宛先：</label>
                      <input type="text" class="form-control" id="recipient-name">
                    </div>
                    <div class="form-group">
                      <label for="message-text" class="col-form-label">内容：</label>
                      <textarea class="form-control" id="message-text"></textarea>
                    </div>
                  </form>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal">閉じる</button>
                  <button type="button" class="btn btn-primary">送信</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button type="button" class="btn btn-danger" id="use_coupon_link">今すぐ使う</button>
      </div>  
    </div>

    <div class="section">Some section</div>

    <div class="section">Some section</div>
  </div>

  <script> 
    new fullpage('#fullpage', {
      //options here
      autoScrolling:true,
      scrollHorizontally: false
    });

    //methods
    fullpage_api.setAllowScrolling(true);
  </script>

  <style>
    @keyframes show {
      from{
        display: none;
      }
      to{
        display:block;
      }
    }
  </style>

	<script>
    //解析前面网站发送过来的get请求
    function analyze_url(url){
        var data = new Map();
        var arr = url.split("?")[1].split("&");
        for(var i=0; i<arr.length;i++){
            var key = arr[i].split("=")[0];
            var value = arr[i].split("=")[1];
            data.set(key,value);
        }
        return data;
    }

		window.onload = function(){
      $("#open_btn").click(function(){
        $("#exampleModal").show(300);
      });
      $("button[class='close']").click(function(){
        $("#exampleModal").css("display","none");
      });
      $("button[data-dismiss='modal']").click(function(){
        $("#exampleModal").css("display","none");
      });

			var prev_url = window.location.href;
      var data = analyze_url(prev_url);
      $("#message-text").text(`クーポンコードは：${data.get("coupon_code")}`);
      $("#use_coupon_link").click(function(){
        alert(data.get("coupon_link"));
        window.open("https://www.google.com","_self");
      });
		}
	</script>
</body>
</html>
